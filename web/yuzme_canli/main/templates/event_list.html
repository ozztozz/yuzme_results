{% extends "base.html" %}

{% block title %}Etkinlikler | Yuzme Canli{% endblock %}

{% block content %}
<section class="mb-6">
    <h1 class="text-3xl font-bold mb-2">Etkinlik Listesi</h1>
    <p class="opacity-80">Web uygulamasina yuklenmis tum etkinlikler.</p>
</section>

<section class="overflow-x-auto rounded-2xl border border-base-200 bg-base-100 shadow-sm">
    <table class="table table-sm sm:table-md">
        <thead>
            <tr>
                <th>ID</th>
                <th>Yer</th>
                <th></th>
            </tr>
        </thead>
        <tbody>
            {% for event in events %}
            <tr>
                <td class="font-medium">{{ event.id }}</td>
                <td>{{ event.location }}</td>
                <td>
                    <a href="/events/{{ event.id }}/" class="btn btn-xs btn-outline">Ac</a>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="3" class="opacity-70">Etkinlik bulunamadi.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</section>
{% endblock %}
